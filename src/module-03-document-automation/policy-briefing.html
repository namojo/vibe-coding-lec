<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정책 브리핑 자동 생성기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #eef1f5;
    color: #333;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #0f4c75, #1b6ca8);
    color: #fff;
    padding: 24px 32px;
    text-align: center;
  }

  header h1 { font-size: 1.6rem; margin-bottom: 4px; }
  header p  { font-size: 0.9rem; color: rgba(255,255,255,.7); }

  .container {
    max-width: 1100px;
    margin: 28px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }

  .panel {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid #e8eaed;
    display: flex; align-items: center; justify-content: space-between;
  }

  .panel-header h2 { font-size: 1.05rem; color: #1e293b; }
  .panel-body { padding: 24px; }

  /* 폼 */
  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 0.88rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #dde0e4;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    color: #333;
    transition: border-color .2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #0f4c75;
    box-shadow: 0 0 0 3px rgba(15,76,117,.1);
  }

  .form-group textarea { min-height: 140px; resize: vertical; line-height: 1.6; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, #0f4c75, #1b6ca8);
    color: #fff;
  }
  .btn-primary:hover { opacity: .9; }

  .btn-secondary {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #e2e8f0;
  }
  .btn-secondary:hover { background: #e2e8f0; }

  .btn-print {
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fde68a;
  }
  .btn-print:hover { background: #fde68a; }

  /* 브리핑 출력 */
  .briefing {
    padding: 48px 44px;
    line-height: 1.8;
  }

  .briefing-empty {
    display: flex; align-items: center; justify-content: center;
    min-height: 500px;
    color: #94a3b8;
    font-size: 0.95rem;
  }

  .doc-header {
    text-align: center;
    border-bottom: 3px double #1e3a5f;
    padding-bottom: 20px;
    margin-bottom: 28px;
  }

  .doc-header .doc-type {
    font-size: 0.85rem;
    color: #64748b;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .doc-header h2 {
    font-size: 1.5rem;
    color: #0f4c75;
    margin-bottom: 6px;
  }

  .doc-header .doc-meta {
    font-size: 0.85rem;
    color: #64748b;
  }

  .doc-section { margin-bottom: 24px; }

  .doc-section h3 {
    font-size: 1rem;
    color: #0f4c75;
    margin-bottom: 10px;
    padding-left: 12px;
    border-left: 3px solid #0f4c75;
  }

  .doc-section p, .doc-section li {
    font-size: 0.92rem;
    color: #334155;
  }

  .doc-section ul {
    padding-left: 24px;
    margin-top: 6px;
  }

  .doc-section li { margin-bottom: 6px; }

  .doc-footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid #d0d5dd;
    text-align: right;
    font-size: 0.88rem;
    color: #64748b;
  }

  /* 인쇄 스타일 */
  @media print {
    body { background: #fff; }
    header, .input-panel, .panel-header, .btn-row { display: none; }
    .container { display: block; max-width: none; margin: 0; padding: 0; }
    .panel { box-shadow: none; border-radius: 0; }
    .briefing {
      padding: 20mm;
      width: 210mm;
      min-height: 297mm;
    }
    .doc-header { border-bottom-color: #000; }
    .doc-header h2, .doc-section h3 { color: #000; }
    .doc-section h3 { border-left-color: #000; }
  }

  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>정책 브리핑 자동 생성기</h1>
  <p>정책 정보를 입력하면 공문서 스타일의 브리핑 문서를 자동 생성합니다</p>
</header>

<div class="container">

  <!-- 입력 패널 -->
  <div class="panel input-panel">
    <div class="panel-header"><h2>정책 정보 입력</h2></div>
    <div class="panel-body">
      <div class="form-group">
        <label>정책 분야</label>
        <select id="field">
          <option value="디지털 전환">디지털 전환</option>
          <option value="인공지능">인공지능</option>
          <option value="데이터">데이터</option>
          <option value="사이버보안">사이버보안</option>
          <option value="스마트시티">스마트시티</option>
          <option value="교육">교육</option>
          <option value="복지">복지</option>
          <option value="환경">환경</option>
        </select>
      </div>
      <div class="form-group">
        <label>정책명</label>
        <input type="text" id="policyName" placeholder="예: 공공부문 AI 도입 촉진 방안">
      </div>
      <div class="form-group">
        <label>주요 내용</label>
        <textarea id="content" placeholder="정책의 핵심 내용을 입력하세요.&#10;&#10;여러 항목은 줄바꿈으로 구분합니다.&#10;예:&#10;AI 도입 시범사업 3개 지자체 추진&#10;국산 AI 모델 공공부문 적용&#10;연내 100개 공공서비스에 AI 접목"></textarea>
      </div>
      <div class="form-group">
        <label>대상 독자</label>
        <select id="audience">
          <option value="기관장">기관장</option>
          <option value="실무 담당자">실무 담당자</option>
          <option value="관계 기관">관계 기관</option>
          <option value="일반 국민">일반 국민</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="generate()">브리핑 생성</button>
        <button class="btn btn-secondary" onclick="loadSample()">예제 불러오기</button>
      </div>
    </div>
  </div>

  <!-- 출력 패널 -->
  <div class="panel">
    <div class="panel-header">
      <h2>브리핑 문서</h2>
      <div class="btn-row" style="margin:0">
        <button class="btn btn-print" onclick="window.print()">인쇄하기</button>
      </div>
    </div>
    <div id="output">
      <div class="briefing-empty">왼쪽에서 정책 정보를 입력하고 "브리핑 생성"을 눌러주세요</div>
    </div>
  </div>

</div>

<script>
function loadSample() {
  document.getElementById('field').value = '인공지능';
  document.getElementById('policyName').value = '2025년 공공부문 AI 도입 촉진 방안';
  document.getElementById('content').value =
`AI 도입 시범사업을 세종시, 부산시, 제주도 3개 지자체에서 추진
국산 AI 모델 중 공공 데이터 특화 모델(정확도 93%)을 우선 적용
시범사업 기간: 2025년 4월~9월 (6개월)
연내 100개 공공서비스에 AI 기능 접목 목표
공무원 대상 AI 리터러시 교육 5,000명 실시
AI 윤리 가이드라인 수립 및 적용 의무화`;
  document.getElementById('audience').value = '기관장';
}

function generate() {
  const field = document.getElementById('field').value;
  const name = document.getElementById('policyName').value.trim();
  const raw = document.getElementById('content').value.trim();
  const audience = document.getElementById('audience').value;

  if (!name || !raw) { alert('정책명과 주요 내용을 입력해주세요.'); return; }

  const items = raw.split('\n').map(s => s.trim()).filter(Boolean);
  const today = new Date();
  const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;

  // 대상 독자별 톤 조정
  const toneMap = {
    '기관장': { greeting: '아래와 같이 주요 사항을 보고드립니다.', closing: '이상 보고드립니다.' },
    '실무 담당자': { greeting: '아래 내용을 참고하시어 업무에 활용하시기 바랍니다.', closing: '관련 문의사항은 담당부서로 연락 바랍니다.' },
    '관계 기관': { greeting: '아래와 같이 주요 추진 현황을 안내드립니다.', closing: '귀 기관의 적극적인 협조를 부탁드립니다.' },
    '일반 국민': { greeting: '아래와 같이 주요 내용을 안내해 드립니다.', closing: '자세한 사항은 NIA 홈페이지를 참고해 주시기 바랍니다.' },
  };

  const tone = toneMap[audience] || toneMap['기관장'];

  // 기대효과 자동 생성
  const effectMap = {
    '디지털 전환': ['공공서비스 디지털 접근성 향상', '행정 효율성 제고 및 비용 절감'],
    '인공지능':   ['공공서비스 품질 향상 및 업무 효율화', 'AI 산업 생태계 활성화 기여'],
    '데이터':     ['데이터 기반 과학적 정책 결정 지원', '공공 데이터 활용도 제고'],
    '사이버보안':  ['국가 사이버 안보 역량 강화', '국민 개인정보 보호 수준 향상'],
    '스마트시티':  ['시민 생활 편의성 및 안전성 향상', '도시 운영 효율성 제고'],
    '교육':       ['디지털 인재 양성 기반 마련', '교육 격차 해소 및 접근성 강화'],
    '복지':       ['복지 사각지대 해소', '맞춤형 복지서비스 제공 역량 강화'],
    '환경':       ['탄소중립 목표 달성 기여', '환경 모니터링 체계 고도화'],
  };

  const effects = effectMap[field] || ['정책 목표 달성 기여', '관련 분야 역량 강화'];

  let html = `
<div class="briefing">
  <div class="doc-header">
    <div class="doc-type">정 책 브 리 핑</div>
    <h2>${esc(name)}</h2>
    <div class="doc-meta">${dateStr} | ${esc(field)} 분야 | 대상: ${esc(audience)}</div>
  </div>

  <div class="doc-section">
    <h3>1. 개요</h3>
    <p>${esc(field)} 분야의 「${esc(name)}」에 대하여 ${tone.greeting}</p>
  </div>

  <div class="doc-section">
    <h3>2. 추진 배경</h3>
    <p>국내외 ${esc(field)} 환경의 급격한 변화에 대응하고, 공공부문의 선도적 역할 수행을 위해 본 정책을 추진하게 되었습니다.</p>
  </div>

  <div class="doc-section">
    <h3>3. 주요 내용</h3>
    <ul>${items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
  </div>

  <div class="doc-section">
    <h3>4. 기대 효과</h3>
    <ul>${effects.map(e => `<li>${e}</li>`).join('')}</ul>
  </div>

  <div class="doc-section">
    <h3>5. 향후 계획</h3>
    <p>본 정책의 차질 없는 이행을 위해 관계부처 및 유관기관과 긴밀히 협력하여 추진할 예정입니다.</p>
  </div>

  <div class="doc-footer">
    <p>${tone.closing}</p>
    <p style="margin-top:12px"><strong>한국지능정보사회진흥원(NIA)</strong><br>디지털혁신부</p>
  </div>
</div>`;

  document.getElementById('output').innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>

</body>
</html>
