<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공공데이터 인구통계 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f5f6fa; color: #2d3436; }

        .header {
            background: linear-gradient(135deg, #0984e3, #6c5ce7);
            color: #fff; padding: 20px 32px;
        }
        .header h1 { font-size: 22px; }
        .header p { font-size: 13px; opacity: .8; margin-top: 4px; }

        .toolbar {
            background: #fff; border-bottom: 1px solid #e0e0e0; padding: 14px 32px;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
        }
        .toolbar label { font-size: 13px; font-weight: 600; color: #636e72; }
        .toolbar select, .toolbar button {
            padding: 7px 12px; border: 1px solid #dfe6e9; border-radius: 6px;
            font-size: 13px; background: #fff; cursor: pointer;
        }
        .toolbar button { background: #0984e3; color: #fff; border: none; font-weight: 500; }
        .toolbar button:hover { background: #0770c2; }
        .toolbar button.active { background: #6c5ce7; }
        .filter-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-tag {
            background: #dfe6e9; padding: 4px 10px; border-radius: 12px;
            font-size: 12px; display: flex; align-items: center; gap: 4px;
        }
        .filter-tag .remove { cursor: pointer; font-weight: bold; color: #636e72; }

        .container { max-width: 1300px; margin: 0 auto; padding: 24px 32px; }

        .summary-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px; margin-bottom: 24px;
        }
        .card {
            background: #fff; border-radius: 12px; padding: 18px 22px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .card-label { font-size: 12px; color: #b2bec3; text-transform: uppercase; letter-spacing: .5px; }
        .card-value { font-size: 26px; font-weight: 700; margin-top: 4px; }
        .card-sub { font-size: 12px; color: #636e72; margin-top: 4px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .chart-box {
            background: #fff; border-radius: 12px; padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .chart-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .chart-box .subtitle { font-size: 12px; color: #b2bec3; margin-bottom: 14px; }
        .chart-actions { display: flex; gap: 6px; margin-bottom: 10px; }
        .chart-actions button {
            padding: 4px 10px; border: 1px solid #dfe6e9; border-radius: 4px;
            font-size: 11px; background: #fff; cursor: pointer;
        }
        .chart-actions button.active { background: #0984e3; color: #fff; border-color: #0984e3; }

        .detail-card {
            background: #fff; border-radius: 12px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 24px;
        }
        .detail-card h3 { font-size: 16px; margin-bottom: 16px; }
        .detail-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px;
        }
        .detail-item { text-align: center; padding: 12px; background: #f5f6fa; border-radius: 8px; }
        .detail-item .val { font-size: 22px; font-weight: 700; color: #0984e3; }
        .detail-item .lbl { font-size: 12px; color: #636e72; margin-top: 4px; }

        /* 비교 모드 */
        .compare-section {
            background: #fff; border-radius: 12px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 24px; display: none;
        }
        .compare-section.show { display: block; }
        .compare-section h3 { font-size: 16px; margin-bottom: 16px; }
        .compare-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: start; }
        .compare-col { text-align: center; }
        .compare-col h4 { font-size: 18px; margin-bottom: 12px; color: #0984e3; }
        .compare-vs { font-size: 24px; font-weight: 700; color: #b2bec3; align-self: center; }
        .compare-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }

        .footer { text-align: center; padding: 24px; font-size: 12px; color: #b2bec3; }

        @media (max-width: 800px) {
            .grid-2 { grid-template-columns: 1fr; }
            .compare-grid { grid-template-columns: 1fr; }
            .compare-vs { display: none; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>공공데이터 인구통계 대시보드</h1>
    <p>주요 광역시 인구 현황 및 고령화 지표 분석 (2025년 기준 시뮬레이션 데이터)</p>
</div>

<div class="toolbar">
    <label>지역 필터:</label>
    <div class="filter-tags" id="filterTags"></div>
    <select id="addRegion" onchange="addFilter(this.value); this.value='';">
        <option value="">+ 지역 추가</option>
    </select>
    <label style="margin-left:16px;">정렬:</label>
    <select id="sortSelect" onchange="render()">
        <option value="population-desc">인구 많은순</option>
        <option value="population-asc">인구 적은순</option>
        <option value="aging-desc">고령화율 높은순</option>
        <option value="aging-asc">고령화율 낮은순</option>
    </select>
    <button onclick="toggleCompare()" id="compareBtn">비교 모드</button>
</div>

<div class="container">
    <!-- 요약 카드 -->
    <div class="summary-cards" id="summaryCards"></div>

    <!-- 차트 -->
    <div class="grid-2">
        <div class="chart-box">
            <h3>지역별 인구 현황</h3>
            <p class="subtitle">단위: 만명</p>
            <div class="chart-actions" id="popChartActions">
                <button class="active" onclick="setPopChartType('bar', this)">막대</button>
                <button onclick="setPopChartType('polarArea', this)">방사형</button>
            </div>
            <canvas id="popChart" height="140"></canvas>
        </div>
        <div class="chart-box">
            <h3>고령화율 비교</h3>
            <p class="subtitle">65세 이상 인구 비율 (%)</p>
            <canvas id="agingChart" height="140"></canvas>
        </div>
    </div>

    <!-- 지역 상세 -->
    <div class="detail-card" id="detailCard">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 id="detailTitle">지역 상세 정보</h3>
            <select id="detailRegion" onchange="renderDetail()"></select>
        </div>
        <div class="detail-grid" id="detailGrid"></div>
    </div>

    <!-- 비교 모드 -->
    <div class="compare-section" id="compareSection">
        <h3>지역 비교</h3>
        <div style="display:flex;gap:10px;margin-bottom:16px;">
            <select id="compare1" onchange="renderCompare()"></select>
            <span style="align-self:center;font-weight:700;color:#b2bec3;">VS</span>
            <select id="compare2" onchange="renderCompare()"></select>
        </div>
        <div class="compare-grid" id="compareGrid"></div>
    </div>
</div>

<div class="footer">
    데이터 출처: 공공데이터포털 (시뮬레이션) · 통계청 인구총조사 기반 가공
</div>

<script>
// ── 데모 데이터 ──
const REGIONS = [
    { name:'서울', population:9411, area:605, density:15555, aged:17.5, youth:10.8, households:4310, growth:-0.3, male:4620, female:4791 },
    { name:'부산', population:3314, area:770, density:4304, aged:20.8, youth:8.9, households:1450, growth:-0.8, male:1630, female:1684 },
    { name:'대구', population:2370, area:883, density:2684, aged:18.9, youth:9.5, households:1020, growth:-0.5, male:1170, female:1200 },
    { name:'인천', population:2980, area:1063, density:2803, aged:15.2, youth:11.2, households:1250, growth:0.2, male:1500, female:1480 },
    { name:'대전', population:1445, area:539, density:2681, aged:16.1, youth:10.5, households:640, growth:-0.2, male:720, female:725 },
    { name:'세종', population:388, area:465, density:835, aged:10.3, youth:16.8, households:170, growth:3.5, male:195, female:193 },
];

const COLORS = ['#0984e3','#e17055','#00b894','#fdcb6e','#6c5ce7','#d63031'];

let selectedRegions = REGIONS.map(r => r.name);
let popChart, agingChart;
let popChartType = 'bar';
let compareMode = false;

// ── 필터 관리 ──
function rebuildAddSelect() {
    const sel = document.getElementById('addRegion');
    sel.innerHTML = '<option value="">+ 지역 추가</option>';
    REGIONS.filter(r => !selectedRegions.includes(r.name)).forEach(r => {
        sel.innerHTML += `<option value="${r.name}">${r.name}</option>`;
    });
}

function renderFilterTags() {
    document.getElementById('filterTags').innerHTML = selectedRegions.map(name =>
        `<span class="filter-tag">${name}<span class="remove" onclick="removeFilter('${name}')">&times;</span></span>`
    ).join('');
    rebuildAddSelect();
}

function addFilter(name) {
    if (name && !selectedRegions.includes(name)) {
        selectedRegions.push(name);
        render();
    }
}

function removeFilter(name) {
    if (selectedRegions.length <= 1) return;
    selectedRegions = selectedRegions.filter(n => n !== name);
    render();
}

function getFiltered() {
    let data = REGIONS.filter(r => selectedRegions.includes(r.name));
    const sort = document.getElementById('sortSelect').value;
    const [key, dir] = sort.split('-');
    const field = key === 'population' ? 'population' : 'aged';
    data.sort((a,b) => dir === 'desc' ? b[field] - a[field] : a[field] - b[field]);
    return data;
}

// ── 요약 카드 ──
function renderSummary(data) {
    const totalPop = data.reduce((s,d) => s + d.population, 0);
    const avgAging = (data.reduce((s,d) => s + d.aged, 0) / data.length).toFixed(1);
    const totalHH = data.reduce((s,d) => s + d.households, 0);
    const avgGrowth = (data.reduce((s,d) => s + d.growth, 0) / data.length).toFixed(1);

    const cards = [
        { label:'총 인구', value: (totalPop/10000).toFixed(0) !== '0' ? totalPop.toLocaleString() + '천명' : '', sub: `${data.length}개 지역 합계` },
        { label:'평균 고령화율', value: avgAging + '%', sub: avgAging >= 20 ? '초고령사회' : avgAging >= 14 ? '고령사회' : '고령화사회' },
        { label:'총 세대수', value: totalHH.toLocaleString() + '천세대', sub: '등록 세대 기준' },
        { label:'평균 인구증가율', value: avgGrowth + '%', sub: avgGrowth >= 0 ? '증가 추세' : '감소 추세' },
    ];

    document.getElementById('summaryCards').innerHTML = cards.map(c => `
        <div class="card">
            <div class="card-label">${c.label}</div>
            <div class="card-value">${c.value}</div>
            <div class="card-sub">${c.sub}</div>
        </div>
    `).join('');
}

// ── 인구 차트 ──
function renderPopChart(data) {
    const ctx = document.getElementById('popChart').getContext('2d');
    if (popChart) popChart.destroy();

    popChart = new Chart(ctx, {
        type: popChartType,
        data: {
            labels: data.map(d => d.name),
            datasets: [{
                label: '인구 (천명)',
                data: data.map(d => d.population),
                backgroundColor: data.map((_,i) => COLORS[i % COLORS.length] + 'cc'),
                borderColor: data.map((_,i) => COLORS[i % COLORS.length]),
                borderWidth: 1,
                borderRadius: popChartType === 'bar' ? 4 : 0,
            }]
        },
        options: {
            responsive: true,
            indexAxis: 'x',
            plugins: { legend: { display: false } },
            scales: popChartType === 'bar' ? {
                y: { beginAtZero: true, title: { display: true, text: '천명' } }
            } : {}
        }
    });
}

function setPopChartType(type, btn) {
    popChartType = type;
    document.querySelectorAll('#popChartActions button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPopChart(getFiltered());
}

// ── 고령화율 수평 막대 ──
function renderAgingChart(data) {
    const ctx = document.getElementById('agingChart').getContext('2d');
    if (agingChart) agingChart.destroy();

    const sorted = [...data].sort((a,b) => b.aged - a.aged);
    agingChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: sorted.map(d => d.name),
            datasets: [{
                label: '고령화율 (%)',
                data: sorted.map(d => d.aged),
                backgroundColor: sorted.map(d => d.aged >= 20 ? '#d63031cc' : d.aged >= 14 ? '#fdcb6ecc' : '#00b894cc'),
                borderRadius: 4,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { beginAtZero: true, max: 25, title: { display: true, text: '%' } }
            }
        }
    });
}

// ── 상세 카드 ──
function populateDetailSelects() {
    const options = REGIONS.map(r => `<option value="${r.name}">${r.name}</option>`).join('');
    document.getElementById('detailRegion').innerHTML = options;
    document.getElementById('compare1').innerHTML = options;
    const c2 = document.getElementById('compare2');
    c2.innerHTML = options;
    c2.selectedIndex = 1;
}

function renderDetail() {
    const name = document.getElementById('detailRegion').value;
    const r = REGIONS.find(d => d.name === name);
    document.getElementById('detailTitle').textContent = `${r.name} 상세 정보`;

    const items = [
        { val: r.population.toLocaleString() + '천명', lbl: '총 인구' },
        { val: r.area.toLocaleString() + 'km²', lbl: '면적' },
        { val: r.density.toLocaleString() + '명/km²', lbl: '인구밀도' },
        { val: r.aged + '%', lbl: '고령화율' },
        { val: r.youth + '%', lbl: '유소년 비율' },
        { val: r.households.toLocaleString() + '천세대', lbl: '세대수' },
        { val: (r.growth >= 0 ? '+' : '') + r.growth + '%', lbl: '인구증가율' },
        { val: `${r.male.toLocaleString()} / ${r.female.toLocaleString()}`, lbl: '남 / 여 (천명)' },
    ];

    document.getElementById('detailGrid').innerHTML = items.map(i =>
        `<div class="detail-item"><div class="val">${i.val}</div><div class="lbl">${i.lbl}</div></div>`
    ).join('');
}

// ── 비교 모드 ──
function toggleCompare() {
    compareMode = !compareMode;
    document.getElementById('compareSection').classList.toggle('show', compareMode);
    document.getElementById('compareBtn').classList.toggle('active', compareMode);
    if (compareMode) renderCompare();
}

function renderCompare() {
    const n1 = document.getElementById('compare1').value;
    const n2 = document.getElementById('compare2').value;
    const r1 = REGIONS.find(d => d.name === n1);
    const r2 = REGIONS.find(d => d.name === n2);

    const fields = [
        { label:'인구', key:'population', unit:'천명' },
        { label:'면적', key:'area', unit:'km²' },
        { label:'인구밀도', key:'density', unit:'명/km²' },
        { label:'고령화율', key:'aged', unit:'%' },
        { label:'유소년비율', key:'youth', unit:'%' },
        { label:'세대수', key:'households', unit:'천세대' },
        { label:'인구증가율', key:'growth', unit:'%' },
    ];

    document.getElementById('compareGrid').innerHTML = `
        <div class="compare-col">
            <h4>${r1.name}</h4>
            ${fields.map(f => `<div class="compare-row"><span>${f.label}</span><strong>${r1[f.key].toLocaleString()}${f.unit}</strong></div>`).join('')}
        </div>
        <div class="compare-vs">VS</div>
        <div class="compare-col">
            <h4>${r2.name}</h4>
            ${fields.map(f => `<div class="compare-row"><span>${f.label}</span><strong>${r2[f.key].toLocaleString()}${f.unit}</strong></div>`).join('')}
        </div>
    `;
}

// ── 전체 렌더 ──
function render() {
    renderFilterTags();
    const data = getFiltered();
    renderSummary(data);
    renderPopChart(data);
    renderAgingChart(data);
}

// ── 초기화 ──
populateDetailSelects();
render();
renderDetail();
</script>
</body>
</html>
