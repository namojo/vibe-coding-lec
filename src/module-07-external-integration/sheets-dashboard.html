<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민원 현황 대시보드 - Google Sheets 연동</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f0f2f5; color: #333; }

        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: #fff; padding: 20px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .refresh-info { font-size: 13px; opacity: .85; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-dot.live { background: #4caf50; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

        .toolbar {
            background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 32px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .toolbar select, .toolbar button {
            padding: 7px 14px; border: 1px solid #d0d0d0; border-radius: 6px;
            font-size: 13px; background: #fff; cursor: pointer;
        }
        .toolbar button { background: #1a73e8; color: #fff; border: none; font-weight: 500; }
        .toolbar button:hover { background: #1558b0; }
        .toolbar button.secondary { background: #fff; color: #333; border: 1px solid #d0d0d0; }

        .container { max-width: 1280px; margin: 0 auto; padding: 24px 32px; }

        /* 경고 배너 */
        .alert-banner {
            background: #fff3e0; border-left: 4px solid #ff9800; padding: 14px 20px;
            border-radius: 8px; margin-bottom: 20px; display: none; align-items: center; gap: 12px;
        }
        .alert-banner.show { display: flex; }
        .alert-banner .icon { font-size: 20px; }
        .alert-banner .text { flex: 1; font-size: 14px; }
        .alert-banner .close-btn {
            background: none; border: none; font-size: 18px; cursor: pointer; color: #999;
        }

        /* 요약 카드 */
        .summary-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .card {
            background: #fff; border-radius: 12px; padding: 20px 24px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
        }
        .card-label { font-size: 13px; color: #888; margin-bottom: 6px; }
        .card-value { font-size: 28px; font-weight: 700; }
        .card-change { font-size: 13px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
        .card-change.up { color: #e53935; }
        .card-change.down { color: #43a047; }
        .card-change.neutral { color: #888; }

        /* 차트 영역 */
        .chart-section {
            display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px;
        }
        .chart-box {
            background: #fff; border-radius: 12px; padding: 20px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
        }
        .chart-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

        /* 테이블 */
        .table-box {
            background: #fff; border-radius: 12px; padding: 20px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
        }
        .table-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        th { background: #fafafa; font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
        th:hover { background: #f0f0f0; }
        th .sort-icon { font-size: 11px; margin-left: 4px; color: #aaa; }
        tr:hover td { background: #f8f9fa; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
        }
        .badge.good { background: #e8f5e9; color: #2e7d32; }
        .badge.warn { background: #fff3e0; color: #e65100; }
        .badge.bad { background: #ffebee; color: #c62828; }

        .footer { text-align: center; padding: 24px; font-size: 12px; color: #aaa; }

        @media (max-width: 800px) {
            .chart-section { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>민원 현황 대시보드</h1>
    <div class="header-right">
        <span class="refresh-info">
            <span class="status-dot live"></span>
            자동 갱신 · 마지막 동기화: <span id="lastSync">--</span>
        </span>
    </div>
</div>

<div class="toolbar">
    <div style="display:flex;gap:8px;align-items:center;">
        <select id="yearSelect">
            <option value="2026">2026년</option>
            <option value="2025">2025년</option>
        </select>
        <select id="deptSelect">
            <option value="all">전체 부서</option>
            <option value="민원과">민원과</option>
            <option value="복지과">복지과</option>
            <option value="환경과">환경과</option>
        </select>
    </div>
    <div style="display:flex;gap:8px;">
        <button class="secondary" onclick="exportReport()">보고서 내보내기</button>
        <button onclick="refreshData()">새로고침</button>
    </div>
</div>

<div class="container">
    <!-- 경고 배너 -->
    <div class="alert-banner show" id="alertBanner">
        <span class="icon">&#9888;</span>
        <span class="text"><strong>주의:</strong> 3월 민원 처리율이 목표(95%) 미달입니다. 현재 <strong>91.2%</strong></span>
        <button class="close-btn" onclick="this.parentElement.classList.remove('show')">&times;</button>
    </div>

    <!-- 요약 카드 -->
    <div class="summary-cards" id="summaryCards"></div>

    <!-- 차트 -->
    <div class="chart-section">
        <div class="chart-box">
            <h3>월별 민원 접수 및 처리율 추이</h3>
            <canvas id="mainChart" height="100"></canvas>
        </div>
        <div class="chart-box">
            <h3>부서별 민원 비중</h3>
            <canvas id="deptChart" height="180"></canvas>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="table-box">
        <h3>월별 상세 현황</h3>
        <table>
            <thead>
                <tr id="tableHead"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="footer">
    데이터 출처: Google Sheets (시뮬레이션) · 갱신 주기 30초 · NIA 민원관리시스템
</div>

<script>
// ── 하드코딩 데모 데이터 ──
const DATA_2026 = [
    { month:'1월', received:342, processed:338, rate:98.8, avgDays:2.1, prevReceived:310 },
    { month:'2월', received:298, processed:291, rate:97.7, avgDays:2.3, prevReceived:342 },
    { month:'3월', received:415, processed:378, rate:91.1, avgDays:3.8, prevReceived:298 },
];

const DATA_2025 = [
    { month:'1월', received:310, processed:305, rate:98.4, avgDays:2.0, prevReceived:290 },
    { month:'2월', received:285, processed:278, rate:97.5, avgDays:2.5, prevReceived:310 },
    { month:'3월', received:350, processed:340, rate:97.1, avgDays:2.8, prevReceived:285 },
    { month:'4월', received:320, processed:315, rate:98.4, avgDays:2.1, prevReceived:350 },
    { month:'5월', received:295, processed:290, rate:98.3, avgDays:1.9, prevReceived:320 },
    { month:'6월', received:410, processed:398, rate:97.1, avgDays:2.7, prevReceived:295 },
    { month:'7월', received:380, processed:370, rate:97.4, avgDays:2.5, prevReceived:410 },
    { month:'8월', received:305, processed:300, rate:98.4, avgDays:2.0, prevReceived:380 },
    { month:'9월', received:340, processed:332, rate:97.6, avgDays:2.2, prevReceived:305 },
    { month:'10월', received:360, processed:355, rate:98.6, avgDays:1.8, prevReceived:340 },
    { month:'11월', received:390, processed:382, rate:97.9, avgDays:2.4, prevReceived:360 },
    { month:'12월', received:330, processed:325, rate:98.5, avgDays:2.1, prevReceived:390 },
];

const DEPT_DATA = [
    { name:'민원과', count:480, color:'#1a73e8' },
    { name:'복지과', count:310, color:'#34a853' },
    { name:'환경과', count:180, color:'#fbbc04' },
    { name:'건설과', count:85,  color:'#ea4335' },
];

let currentData = DATA_2026;
let sortCol = null, sortDir = 1;
let mainChart, deptChart;

// ── 요약 카드 ──
function renderSummary(data) {
    const latest = data[data.length - 1];
    const totalReceived = data.reduce((s,d) => s + d.received, 0);
    const totalProcessed = data.reduce((s,d) => s + d.processed, 0);
    const avgRate = (data.reduce((s,d) => s + d.rate, 0) / data.length).toFixed(1);
    const avgDays = (data.reduce((s,d) => s + d.avgDays, 0) / data.length).toFixed(1);

    const diff = latest.received - latest.prevReceived;
    const diffPct = ((diff / latest.prevReceived) * 100).toFixed(1);

    const cards = [
        { label:'총 민원 접수', value: totalReceived.toLocaleString() + '건', change: diff > 0 ? `+${diffPct}%` : `${diffPct}%`, dir: diff > 0 ? 'up':'down' },
        { label:'총 처리 완료', value: totalProcessed.toLocaleString() + '건', change: null, dir:'neutral' },
        { label:'평균 처리율', value: avgRate + '%', change: avgRate >= 95 ? '목표 달성':'목표 미달', dir: avgRate >= 95 ? 'down':'up' },
        { label:'평균 처리일', value: avgDays + '일', change: avgDays <= 3 ? '양호':'지연', dir: avgDays <= 3 ? 'down':'up' },
    ];

    document.getElementById('summaryCards').innerHTML = cards.map(c => `
        <div class="card">
            <div class="card-label">${c.label}</div>
            <div class="card-value">${c.value}</div>
            ${c.change ? `<div class="card-change ${c.dir}">
                ${c.dir === 'up' ? '&#9650;' : c.dir === 'down' ? '&#9660;' : '●'} 전월대비 ${c.change}
            </div>` : ''}
        </div>
    `).join('');
}

// ── 메인 차트 (복합: 막대 + 선) ──
function renderMainChart(data) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (mainChart) mainChart.destroy();

    mainChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.map(d => d.month),
            datasets: [
                {
                    label: '접수 건수',
                    data: data.map(d => d.received),
                    backgroundColor: 'rgba(26,115,232,.6)',
                    borderRadius: 4,
                    order: 2,
                    yAxisID: 'y',
                },
                {
                    label: '처리율 (%)',
                    data: data.map(d => d.rate),
                    type: 'line',
                    borderColor: '#e53935',
                    backgroundColor: 'rgba(229,57,53,.1)',
                    pointRadius: 5,
                    tension: .3,
                    fill: false,
                    order: 1,
                    yAxisID: 'y1',
                }
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: { beginAtZero: false, title: { display: true, text: '건수' } },
                y1: { position: 'right', min: 85, max: 100, title: { display: true, text: '처리율 (%)' }, grid: { drawOnChartArea: false } }
            },
            plugins: { legend: { position: 'bottom' } }
        }
    });
}

// ── 부서별 도넛 차트 ──
function renderDeptChart() {
    const ctx = document.getElementById('deptChart').getContext('2d');
    if (deptChart) deptChart.destroy();

    deptChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: DEPT_DATA.map(d => d.name),
            datasets: [{
                data: DEPT_DATA.map(d => d.count),
                backgroundColor: DEPT_DATA.map(d => d.color),
                borderWidth: 0,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } }
        }
    });
}

// ── 테이블 ──
const COLUMNS = [
    { key:'month', label:'월' },
    { key:'received', label:'접수 건수' },
    { key:'processed', label:'처리 건수' },
    { key:'rate', label:'처리율 (%)' },
    { key:'avgDays', label:'평균 처리일' },
    { key:'status', label:'상태' },
];

function renderTable(data) {
    document.getElementById('tableHead').innerHTML = COLUMNS.map(c =>
        `<th onclick="sortTable('${c.key}')">${c.label}<span class="sort-icon">${sortCol===c.key?(sortDir===1?'&#9650;':'&#9660;'):'&#8693;'}</span></th>`
    ).join('');

    let rows = [...data];
    if (sortCol && sortCol !== 'status') {
        rows.sort((a,b) => (a[sortCol] > b[sortCol] ? 1 : -1) * sortDir);
    }

    document.getElementById('tableBody').innerHTML = rows.map(d => {
        const status = d.rate >= 97 ? 'good' : d.rate >= 93 ? 'warn' : 'bad';
        const statusText = d.rate >= 97 ? '양호' : d.rate >= 93 ? '주의' : '미달';
        return `<tr>
            <td>${d.month}</td>
            <td>${d.received.toLocaleString()}</td>
            <td>${d.processed.toLocaleString()}</td>
            <td>${d.rate}%</td>
            <td>${d.avgDays}일</td>
            <td><span class="badge ${status}">${statusText}</span></td>
        </tr>`;
    }).join('');
}

function sortTable(key) {
    if (sortCol === key) sortDir *= -1;
    else { sortCol = key; sortDir = 1; }
    renderTable(currentData);
}

// ── 데이터 갱신 ──
function updateSyncTime() {
    const now = new Date();
    document.getElementById('lastSync').textContent =
        now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function refreshData() {
    const year = document.getElementById('yearSelect').value;
    currentData = year === '2026' ? DATA_2026 : DATA_2025;
    renderSummary(currentData);
    renderMainChart(currentData);
    renderTable(currentData);
    updateSyncTime();
}

// ── 보고서 내보내기 ──
function exportReport() {
    let csv = 'BOM\n월,접수건수,처리건수,처리율(%),평균처리일\n';
    currentData.forEach(d => {
        csv += `${d.month},${d.received},${d.processed},${d.rate},${d.avgDays}\n`;
    });
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `민원현황_${document.getElementById('yearSelect').value}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

// ── 이벤트 바인딩 ──
document.getElementById('yearSelect').addEventListener('change', refreshData);
document.getElementById('deptSelect').addEventListener('change', refreshData);

// ── 초기화 & 자동 갱신 ──
refreshData();
renderDeptChart();
setInterval(() => {
    updateSyncTime();
    // 시뮬레이션: 약간의 데이터 변동
    if (currentData === DATA_2026 && Math.random() > .7) {
        const last = currentData[currentData.length - 1];
        last.received += Math.floor(Math.random() * 3);
        last.processed += Math.floor(Math.random() * 2);
        last.rate = +((last.processed / last.received) * 100).toFixed(1);
        renderSummary(currentData);
        renderMainChart(currentData);
        renderTable(currentData);
    }
}, 30000);
</script>
</body>
</html>
